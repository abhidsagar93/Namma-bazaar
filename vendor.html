<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Namma Bazaar — Sell Here</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --marigold: #E5A431; --teal: #14213D; --brick: #C1440E;
    --cream: #FAFAF8; --ink: #16211C; --leaf: #2F5233; --line: #E4E7DE;
    --shadow: 0 1px 3px rgba(22,33,28,0.06), 0 8px 24px rgba(22,33,28,0.05);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: var(--cream); color: var(--ink); font-family: 'Inter', sans-serif; }
  .display { font-family: 'Sora', sans-serif; font-weight: 800; letter-spacing: -0.02em; }
  header {
    background: var(--teal);
    background-image: radial-gradient(ellipse 140% 100% at 100% -20%, rgba(229,164,49,0.18), transparent 60%);
    color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  header .logo { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 16px; }
  header .logo span { color: var(--marigold); }
  header button {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: white;
    border-radius: 20px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  main { max-width: 480px; margin: 0 auto; padding: 16px; }
  input, select, textarea {
    width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid var(--line);
    font-size: 14px; margin-bottom: 10px; font-family: inherit; background: white;
  }
  input:focus, select:focus { outline: none; border-color: var(--teal); }
  button.primary {
    background: var(--teal); color: white; border: none; border-radius: 12px; padding: 13px;
    font-weight: 700; font-size: 14px; width: 100%; cursor: pointer; letter-spacing: -0.01em;
  }
  button.primary:hover { filter: brightness(1.15); }
  .card { background: white; border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .tab-link { color: var(--teal); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; margin-top: 10px; }
  .error { color: var(--brick); font-size: 13px; margin-bottom: 10px; font-weight: 500; }
  .hidden { display: none; }
  .pending-notice { background: #fdf1de; color: #a85c1c; padding: 14px; border-radius: 12px; font-size: 13px; text-align: center; font-weight: 500; }
  .cat-title { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 12px; color: var(--teal); text-transform: uppercase; letter-spacing: 0.06em; margin: 18px 0 10px; }
  .add-row { display: flex; gap: 8px; }
  .add-row input { flex: 1; }
  .status-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; background: #fdf1de; color: #a85c1c; }
  .action-btn { background: var(--leaf); color: white; border: none; border-radius: 16px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">NAMMA <span>BAZAAR</span> — SELL</div>
  <div id="authStatus"></div>
</header>

<main>
  <div id="authScreen">
    <div class="card">
      <div id="loginForm">
        <h3 class="display" style="font-size:16px;">LOG IN</h3>
        <div id="loginError" class="error hidden"></div>
        <input id="loginEmail" type="email" placeholder="Email" />
        <input id="loginPassword" type="password" placeholder="Password" />
        <button class="primary" onclick="handleLogin()">Log In</button>
        <div class="tab-link" onclick="toggleAuthForm()">New here? Register your shop</div>
      </div>
      <div id="signupForm" class="hidden">
        <h3 class="display" style="font-size:16px;">REGISTER YOUR SHOP</h3>
        <div id="signupError" class="error hidden"></div>
        <input id="signupName" placeholder="Your full name" />
        <input id="signupPhone" placeholder="Phone number" />
        <input id="signupEmail" type="email" placeholder="Email" />
        <input id="signupPassword" type="password" placeholder="Password (min 6 characters)" />
        <button class="primary" onclick="handleSignup()">Create Account</button>
        <div class="tab-link" onclick="toggleAuthForm()">Already have an account? Log in</div>
      </div>
    </div>
  </div>

  <!-- CREATE SHOP (shown once, after signup) -->
  <div id="createShopScreen" class="hidden">
    <div class="card">
      <h3 class="display" style="font-size:16px;">SET UP YOUR SHOP</h3>
      <div id="shopError" class="error hidden"></div>
      <input id="shopName" placeholder="Shop name" />
      <select id="shopCategory">
        <option>Grocery</option>
        <option>Bakery</option>
        <option>Electronics</option>
        <option>Pharmacy</option>
        <option>Stationery</option>
        <option>Clothing</option>
      </select>
      <input id="shopArea" placeholder="Area/locality in Sagar (e.g. Doddapete)" />
      <input id="shopTagline" placeholder="Tagline (optional)" />
      <input id="shopWhatsapp" placeholder="WhatsApp number" />
      <button class="primary" onclick="createShop()">Create My Shop</button>
    </div>
  </div>

  <div id="pendingScreen" class="hidden">
    <div class="pending-notice">
      Your shop is awaiting admin approval. Once approved, it'll appear to customers automatically.
    </div>
    <div id="pendingDashboard"></div>
  </div>

  <div id="dashboardScreen" class="hidden">
    <div class="cat-title">ADD A PRODUCT</div>
    <div class="add-row">
      <input id="newProductName" placeholder="Product name" />
      <input id="newProductPrice" placeholder="₹ price" type="number" />
    </div>
    <button class="primary" onclick="addProduct()" style="margin-bottom:16px;">Add Product</button>

    <div class="cat-title">YOUR PRODUCTS</div>
    <div id="productsList"></div>

    <div class="cat-title">INCOMING ORDERS</div>
    <div id="ordersList"></div>
  </div>
</main>

<script>
  // ============================================================
  // EDIT THESE with your real Supabase Project URL and anon key
  // ============================================================
  const SUPABASE_URL = "https://cslteodcbedvgxqjagka.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzbHRlb2RjYmVkdmd4cWphZ2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNDI1NzIsImV4cCI6MjA5OTkxODU3Mn0.Q2hQRM2QsKltl30v6JWf-10R6fud_I83-PHKlZFa6WI";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUser = null;
  let myShop = null;

  function toggleAuthForm() {
    document.getElementById("loginForm").classList.toggle("hidden");
    document.getElementById("signupForm").classList.toggle("hidden");
  }

  function showOnly(id) {
    ["authScreen", "createShopScreen", "pendingScreen", "dashboardScreen"].forEach((s) => {
      document.getElementById(s).classList.toggle("hidden", s !== id);
    });
  }

  async function handleSignup() {
    const name = document.getElementById("signupName").value.trim();
    const phone = document.getElementById("signupPhone").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;
    const errEl = document.getElementById("signupError");
    errEl.classList.add("hidden");

    if (!name || !phone || !email || !password) {
      errEl.textContent = "Please fill in all fields.";
      errEl.classList.remove("hidden");
      return;
    }

    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) {
      errEl.textContent = error.message;
      errEl.classList.remove("hidden");
      return;
    }

    const { error: profileError } = await sb.from("profiles").insert({
      id: data.user.id,
      full_name: name,
      phone,
      role: "vendor",
      status: "pending",
    });

    if (profileError) {
      errEl.textContent = profileError.message;
      errEl.classList.remove("hidden");
      return;
    }

    currentUser = data.user;
    showOnly("createShopScreen");
  }

  async function handleLogin() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errEl = document.getElementById("loginError");
    errEl.classList.add("hidden");

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message;
      errEl.classList.remove("hidden");
      return;
    }
    await routeAfterLogin();
  }

  async function handleLogout() {
    await sb.auth.signOut();
    currentUser = null;
    myShop = null;
    document.getElementById("authStatus").innerHTML = "";
    showOnly("authScreen");
  }

  async function createShop() {
    const shop_name = document.getElementById("shopName").value.trim();
    const category = document.getElementById("shopCategory").value;
    const area = document.getElementById("shopArea").value.trim();
    const tagline = document.getElementById("shopTagline").value.trim();
    const whatsapp_number = document.getElementById("shopWhatsapp").value.trim();
    const errEl = document.getElementById("shopError");
    errEl.classList.add("hidden");

    if (!shop_name || !area) {
      errEl.textContent = "Please fill in shop name and area.";
      errEl.classList.remove("hidden");
      return;
    }

    const { error } = await sb.from("shops").insert({
      owner_id: currentUser.id,
      shop_name,
      category,
      area,
      tagline,
      whatsapp_number,
    });

    if (error) {
      errEl.textContent = error.message;
      errEl.classList.remove("hidden");
      return;
    }

    await routeAfterLogin();
  }

  async function routeAfterLogin() {
    const { data: userData } = await sb.auth.getUser();
    currentUser = userData.user;
    document.getElementById("authStatus").innerHTML = `<button onclick="handleLogout()">Log out</button>`;

    const { data: profile } = await sb.from("profiles").select("*").eq("id", currentUser.id).single();

    const { data: shop } = await sb.from("shops").select("*").eq("owner_id", currentUser.id).maybeSingle();
    myShop = shop;

    if (!myShop) {
      showOnly("createShopScreen");
      return;
    }

    if (profile.status !== "approved") {
      showOnly("pendingScreen");
      return;
    }

    showOnly("dashboardScreen");
    await loadProducts();
    await loadOrders();
  }

  async function addProduct() {
    const name = document.getElementById("newProductName").value.trim();
    const price = parseFloat(document.getElementById("newProductPrice").value);
    if (!name || !price || price <= 0) return;

    const { error } = await sb.from("products").insert({
      shop_id: myShop.id,
      name,
      price,
    });
    if (error) {
      alert(error.message);
      return;
    }
    document.getElementById("newProductName").value = "";
    document.getElementById("newProductPrice").value = "";
    await loadProducts();
  }

  async function loadProducts() {
    const { data, error } = await sb.from("products").select("*").eq("shop_id", myShop.id);
    if (error) return;
    document.getElementById("productsList").innerHTML = (data || [])
      .map(
        (p) => `<div class="card" style="display:flex;justify-content:space-between;">
          <span>${p.name}</span><span style="font-weight:700;color:var(--brick);">₹${p.price}</span>
        </div>`
      )
      .join("") || `<div class="card">No products yet — add your first one above.</div>`;
  }

  async function loadOrders() {
    const { data, error } = await sb
      .from("orders")
      .select("*")
      .eq("shop_id", myShop.id)
      .order("placed_at", { ascending: false });
    if (error) return;

    document.getElementById("ordersList").innerHTML =
      (data || [])
        .map(
          (o) => `
      <div class="card">
        <span class="status-badge">${o.status.toUpperCase()}</span>
        <div style="margin-top:6px;font-size:13px;">${o.delivery_address}</div>
        <div style="font-size:13px;font-weight:700;color:var(--brick);">₹${o.total_amount}</div>
        ${
          o.status === "placed"
            ? `<button class="action-btn" onclick="confirmOrder('${o.id}')">Confirm Order</button>`
            : ""
        }
      </div>`
        )
        .join("") || `<div class="card">No orders yet.</div>`;
  }

  async function confirmOrder(orderId) {
    const { error } = await sb.from("orders").update({ status: "confirmed" }).eq("id", orderId);
    if (error) {
      alert(error.message);
      return;
    }
    await loadOrders();
  }

  (async function init() {
    const { data } = await sb.auth.getUser();
    if (data.user) {
      await routeAfterLogin();
    }
  })();
</script>

</body>
</html>

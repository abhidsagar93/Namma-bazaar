<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Namma Bazaar — Delivery Partner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --marigold: #E5A431; --teal: #14213D; --brick: #C1440E;
    --cream: #FAFAF8; --ink: #16211C; --leaf: #2F5233; --line: #E4E7DE;
    --shadow: 0 1px 3px rgba(22,33,28,0.06), 0 8px 24px rgba(22,33,28,0.05);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: var(--cream); color: var(--ink); font-family: 'Inter', sans-serif; }
  .display { font-family: 'Sora', sans-serif; font-weight: 800; letter-spacing: -0.02em; }
  header {
    background: var(--leaf);
    background-image: radial-gradient(ellipse 140% 100% at 100% -20%, rgba(255,255,255,0.12), transparent 60%);
    color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  header .logo { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 15px; }
  header button {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: white;
    border-radius: 20px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  main { max-width: 480px; margin: 0 auto; padding: 16px; }
  input {
    width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid var(--line);
    font-size: 14px; margin-bottom: 10px; font-family: inherit; background: white;
  }
  input:focus { outline: none; border-color: var(--leaf); }
  button.primary {
    background: var(--leaf); color: white; border: none; border-radius: 12px; padding: 13px;
    font-weight: 700; font-size: 14px; width: 100%; cursor: pointer; letter-spacing: -0.01em;
  }
  button.primary:hover { filter: brightness(1.1); }
  .card { background: white; border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .tab-link { color: var(--leaf); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; margin-top: 10px; }
  .error { color: var(--brick); font-size: 13px; margin-bottom: 10px; font-weight: 500; }
  .hidden { display: none; }
  .status-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; display: inline-block; }
  .status-assigned { background: #fdf1de; color: #a85c1c; }
  .status-picked_up { background: #e6efe4; color: var(--leaf); }
  .action-btn { background: var(--marigold); color: var(--ink); border: none; border-radius: 16px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .pending-notice { background: #fdf1de; color: #a85c1c; padding: 14px; border-radius: 12px; font-size: 13px; text-align: center; font-weight: 500; }
</style>
</head>
<body>

<header>
  <div class="logo">🛵 DELIVERY PARTNER</div>
  <div id="authStatus"></div>
</header>

<main>
  <div id="authScreen">
    <div class="card">
      <div id="loginForm">
        <h3 class="display" style="font-size:16px;">LOG IN</h3>
        <div id="loginError" class="error hidden"></div>
        <input id="loginEmail" type="email" placeholder="Email" />
        <input id="loginPassword" type="password" placeholder="Password" />
        <button class="primary" onclick="handleLogin()">Log In</button>
        <div class="tab-link" onclick="toggleAuthForm()">New here? Sign up to deliver</div>
      </div>
      <div id="signupForm" class="hidden">
        <h3 class="display" style="font-size:16px;">BECOME A DELIVERY PARTNER</h3>
        <div id="signupError" class="error hidden"></div>
        <input id="signupName" placeholder="Full name" />
        <input id="signupPhone" placeholder="Phone number" />
        <input id="signupEmail" type="email" placeholder="Email" />
        <input id="signupPassword" type="password" placeholder="Password (min 6 characters)" />
        <button class="primary" onclick="handleSignup()">Sign Up</button>
        <div class="tab-link" onclick="toggleAuthForm()">Already registered? Log in</div>
      </div>
    </div>
  </div>

  <div id="pendingScreen" class="hidden">
    <div class="pending-notice">
      Your delivery partner account is awaiting admin approval. Check back soon!
    </div>
  </div>

  <div id="deliveriesScreen" class="hidden">
    <h3 class="display" style="font-size:15px;color:var(--teal);">YOUR DELIVERIES</h3>
    <div id="deliveriesList"></div>
  </div>
</main>

<script>
  // ============================================================
  // EDIT THESE with your real Supabase Project URL and anon key
  // ============================================================
  const SUPABASE_URL = "https://cslteodcbedvgxqjagka.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzbHRlb2RjYmVkdmd4cWphZ2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNDI1NzIsImV4cCI6MjA5OTkxODU3Mn0.Q2hQRM2QsKltl30v6JWf-10R6fud_I83-PHKlZFa6WI";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUser = null;

  function toggleAuthForm() {
    document.getElementById("loginForm").classList.toggle("hidden");
    document.getElementById("signupForm").classList.toggle("hidden");
  }

  async function handleSignup() {
    const name = document.getElementById("signupName").value.trim();
    const phone = document.getElementById("signupPhone").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;
    const errEl = document.getElementById("signupError");
    errEl.classList.add("hidden");

    if (!name || !phone || !email || !password) {
      errEl.textContent = "Please fill in all fields.";
      errEl.classList.remove("hidden");
      return;
    }

    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) {
      errEl.textContent = error.message;
      errEl.classList.remove("hidden");
      return;
    }

    const { error: profileError } = await sb.from("profiles").insert({
      id: data.user.id,
      full_name: name,
      phone,
      role: "delivery",
      status: "pending", // needs admin approval
    });

    if (profileError) {
      errEl.textContent = profileError.message;
      errEl.classList.remove("hidden");
      return;
    }

    await checkStatusAndLoad();
  }

  async function handleLogin() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errEl = document.getElementById("loginError");
    errEl.classList.add("hidden");

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message;
      errEl.classList.remove("hidden");
      return;
    }
    await checkStatusAndLoad();
  }

  async function handleLogout() {
    await sb.auth.signOut();
    currentUser = null;
    document.getElementById("authScreen").classList.remove("hidden");
    document.getElementById("pendingScreen").classList.add("hidden");
    document.getElementById("deliveriesScreen").classList.add("hidden");
    document.getElementById("authStatus").innerHTML = "";
  }

  async function checkStatusAndLoad() {
    const { data: userData } = await sb.auth.getUser();
    currentUser = userData.user;

    const { data: profile, error } = await sb
      .from("profiles")
      .select("*")
      .eq("id", currentUser.id)
      .single();

    if (error || !profile) {
      console.error(error);
      return;
    }

    document.getElementById("authStatus").innerHTML = `<button onclick="handleLogout()">Log out</button>`;
    document.getElementById("authScreen").classList.add("hidden");

    if (profile.status !== "approved") {
      document.getElementById("pendingScreen").classList.remove("hidden");
      document.getElementById("deliveriesScreen").classList.add("hidden");
      return;
    }

    document.getElementById("pendingScreen").classList.add("hidden");
    document.getElementById("deliveriesScreen").classList.remove("hidden");
    await loadDeliveries();
  }

  async function loadDeliveries() {
    // Orders assigned to this delivery partner, not yet delivered
    const { data, error } = await sb
      .from("orders")
      .select("*, shops(shop_name, area)")
      .eq("delivery_partner_id", currentUser.id)
      .in("status", ["assigned", "picked_up"])
      .order("placed_at", { ascending: true });

    if (error) {
      console.error(error);
      return;
    }

    const list = document.getElementById("deliveriesList");
    if (!data || data.length === 0) {
      list.innerHTML = `<div class="card">No deliveries assigned to you right now.</div>`;
      return;
    }

    list.innerHTML = data
      .map((o) => {
        const statusClass = o.status === "picked_up" ? "status-picked_up" : "status-assigned";
        const nextAction =
          o.status === "assigned"
            ? `<button class="action-btn" onclick="updateStatus('${o.id}', 'picked_up')">Mark Picked Up</button>`
            : `<button class="action-btn" onclick="updateStatus('${o.id}', 'delivered')">Mark Delivered</button>`;

        return `
        <div class="card">
          <span class="status-badge ${statusClass}">${o.status.replace("_", " ").toUpperCase()}</span>
          <div style="font-weight:700;margin-top:8px;">Pickup: ${o.shops?.shop_name || "Shop"} (${o.shops?.area || ""})</div>
          <div style="font-size:13px;margin-top:4px;">Deliver to: ${o.delivery_address}</div>
          <div style="font-size:13px;">Phone: ${o.delivery_phone}</div>
          <div style="font-size:13px;font-weight:700;color:var(--brick);margin-top:4px;">₹${o.total_amount}</div>
          ${nextAction}
        </div>`;
      })
      .join("");
  }

  async function updateStatus(orderId, newStatus) {
    const updates = { status: newStatus };
    if (newStatus === "delivered") {
      updates.delivered_at = new Date().toISOString();
    }
    const { error } = await sb.from("orders").update(updates).eq("id", orderId);
    if (error) {
      alert(error.message);
      return;
    }
    await loadDeliveries();
  }

  (async function init() {
    const { data } = await sb.auth.getUser();
    if (data.user) {
      await checkStatusAndLoad();
    }
  })();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access Denied — Namma Bazar</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#16A34A;
  --green-dark:#0F7A38;
  --green-light:#E8F6EC;
  --orange:#F97316;
  --orange-dark:#DC5F0A;
  --orange-light:#FFEEE0;
  --ink:#14231C;
  --ink-soft:#4B5A52;
  --mist:#F4F7F5;
  --mist-deep:#EAF0EC;
  --line:#E3E9E5;
  --white:#FFFFFF;
  --gold:#F5B301;

  --font-display:'Sora',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;

  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:24px;
  --radius-pill:999px;

  --shadow-sm:0 2px 8px rgba(20,35,28,0.06);
  --shadow-md:0 8px 24px rgba(20,35,28,0.10);
  --shadow-lg:0 20px 48px rgba(20,35,28,0.16);

  --header-h:72px;
  --nav-h:48px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);color:var(--ink);background:var(--white);
  -webkit-font-smoothing:antialiased;line-height:1.55;}
a{color:inherit;text-decoration:none;}
button{font:inherit;cursor:pointer;border:0;background:none;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 22px;border-radius:var(--radius-pill);font-weight:600;font-size:14.5px;
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 6px 16px rgba(22,163,74,.24);}
.btn-primary:hover{background:var(--green-dark);}
.btn-ghost{background:var(--white);color:var(--ink);border:1px solid var(--line);}
.btn-ghost:hover{background:var(--mist);}
html, body{max-width:100%;overflow-x:hidden;}
img, svg{max-width:100%;}
:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px;}
@media (pointer: coarse){ .btn, button { min-height:44px; } }
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important;}
}

/* Error pages share one layout. Tokens and base styles come from
   namma-bazar.css — this is only what these pages add. */
.err-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:32px 20px;background:linear-gradient(160deg,var(--green-light) 0%,#fff 55%);}
.err-card{max-width:520px;width:100%;text-align:center;}
.err-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;
  background:#fff;border:1px solid var(--line);font-size:12px;font-weight:600;
  letter-spacing:.4px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:22px;}
.err-art{width:120px;height:120px;margin:0 auto 24px;display:flex;align-items:center;
  justify-content:center;border-radius:28px;background:#fff;
  box-shadow:0 12px 30px rgba(0,0,0,.07);color:var(--orange);}
.err-art svg{width:56px;height:56px;}
.err-code{font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);margin-bottom:8px;}
.err-title{font-family:var(--font-display);font-size:30px;font-weight:800;line-height:1.15;
  margin-bottom:12px;color:var(--ink);}
.err-msg{color:var(--ink-soft);font-size:15.5px;line-height:1.6;margin-bottom:28px;}
.err-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.err-actions .btn{min-width:150px;justify-content:center;}
.err-help{margin-top:30px;padding-top:22px;border-top:1px solid var(--line);
  font-size:13.5px;color:var(--ink-soft);}
.err-help a{color:var(--green-dark);font-weight:600;}
@media(max-width:520px){
  .err-title{font-size:24px;}
  .err-art{width:96px;height:96px;border-radius:22px;}
  .err-art svg{width:44px;height:44px;}
  .err-actions .btn{width:100%;}
}
/* --- Project-wide safety net & accessibility -------------------------------
   Inlined deliberately. An earlier version kept these in a shared
   namma-bazar.css, but that made every page depend on one file — and a
   single missing upload blanked the whole site. Self-contained pages are
   more robust for a hand-deployed project; the duplication costs ~1.5 KB. */
html, body { max-width: 100%; overflow-x: hidden; }
body { overflow-wrap: break-word; }
img, svg, video, canvas, table { max-width: 100%; }
:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; border-radius: 4px; }
@media (pointer: coarse) { button, .btn, a.btn, [role="button"] { min-height: 44px; } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration:.01ms !important; animation-iteration-count:1 !important;
    transition-duration:.01ms !important; scroll-behavior:auto !important; }
}
.skeleton { background: linear-gradient(90deg, var(--mist) 25%, #EDF1EE 37%, var(--mist) 63%);
  background-size: 400% 100%; animation: skeleton-shimmer 1.4s ease infinite; border-radius: 8px; }
@keyframes skeleton-shimmer { 0%{background-position:100% 50%;} 100%{background-position:0 50%;} }
@media (prefers-reduced-motion: reduce) { .skeleton { animation: none; } }
.img-empty { width:100%; height:100%; min-height:110px; display:flex; align-items:center;
  justify-content:center; background: var(--mist); color: var(--ink-soft); }
.img-empty svg { width:34px; height:34px; opacity:.4; }
</style>
</head>
<body>
<main class="err-wrap">
  <div class="err-card">
    <span class="err-badge">Namma Bazar</span>
    <div class="err-art"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><circle cx="12" cy="15.5" r="1.3"/></svg></div>
    <div class="err-code">Error 403</div>
    <h1 class="err-title">You need permission for this</h1>
    <p class="err-msg">This page is restricted. If you manage a store or work with Namma Bazar, sign in with that account to continue.</p>
    <div class="err-actions"><a href="index.html" class="btn btn-primary">Back to Home</a><a href="seller-login.html" class="btn btn-ghost">Sign In</a></div>
    <div class="err-help">
      Need help? Call <a href="tel:+919731674173">+91 97316 74173</a>
      or <a href="https://wa.me/919731674173" target="_blank" rel="noopener">message us on WhatsApp</a>.
    </div>
  </div>
</main>

</body>
</html>
